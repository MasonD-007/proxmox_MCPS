name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go build -o proxmox-mcp ./cmd/proxmox-mcp/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: proxmox-mcp
          generate_release_notes: true
